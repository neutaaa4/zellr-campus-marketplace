<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zellr | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="icon" type="image/png" href="assets/zellr-logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>

    <style>
        .font-sans-premium { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif-logo { font-family: 'Playfair Display', serif; letter-spacing: -0.01em; }
        .font-sans-subtitle { font-family: 'Montserrat', sans-serif; }
        
        /* SOLID PURE CSS SPOTLIGHT BEAM */
        @keyframes spotlightBreathe {
            0%, 100% { opacity: 0.35; transform: scaleX(1.0) translateY(0px); }
            50% { opacity: 0.65; transform: scaleX(1.20) translateY(2px); }
        }
        .premium-spotlight-beam {
            position: absolute;
            top: 0; left: 0; right: 0; height: 320px;
            pointer-events: none; z-index: 10; filter: blur(28px);
            will-change: opacity, transform; animation: spotlightBreathe 6s ease-in-out infinite;
            background: radial-gradient(ellipse at top, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.08) 55%, rgba(0, 0, 0, 0) 100__);
        }

        /* Premium Ambient Breathing Logo Pulse Keyframes */
        @keyframes logoBreathingPulse {
            0%, 100% { opacity: 0.30; transform: scale(0.92); filter: drop-shadow(0 0 0px rgba(255,255,255,0)); }
            50% { opacity: 1; transform: scale(1.02); filter: drop-shadow(0 0 20px rgba(255,255,255,0.15)); }
        }
        .animate-pulse-logo {
            animation: logoBreathingPulse 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            will-change: opacity, transform, filter;
        }
        
        /* Premium Sheet Pan-Up Entrance Animation */
        @keyframes sheetPanUp {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }
        .auth-sheet-entry { animation: sheetPanUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-black flex justify-center items-center min-h-screen p-0 sm:p-4 font-sans-premium">

    <div class="w-full sm:w-[360px] h-screen sm:h-[800px] bg-black rounded-none sm:rounded-[48px] shadow-none sm:shadow-[0_30px_70px_-15px_rgba(0,0,0,1)] overflow-hidden flex flex-col justify-between relative select-none border-none sm:border sm:border-neutral-900/60">                  
        <!-- Animated Logo Overlay Frame -->
        <div id="successModal" class="absolute inset-0 bg-black z-40 flex flex-col items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-500">
            <div class="w-24 h-24 flex items-center justify-center">
                <img src="assets/zellr-logo.png" alt="Zellr Logo" class="w-full h-auto object-contain invert brightness-200 animate-pulse-logo" />
            </div>
        </div>

        <div class="premium-spotlight-beam"></div>
        
        <div class="w-full h-[280px] relative flex flex-col items-center justify-center text-center p-6 z-10">
            <h1 class="text-[54px] font-bold text-white font-serif-logo leading-none select-none">Zellr</h1>
            <p class="text-[10px] uppercase tracking-[0.24em] font-bold text-neutral-400 mt-2 font-sans-subtitle">The Trusted Campus Marketplace</p>
        </div>

        <div class="bg-white rounded-t-[40px] p-6 flex flex-col justify-between flex-1 shadow-[0_-15px_40px_rgba(0,0,0,0.4)] auth-sheet-entry z-20">
            <div class="flex flex-col justify-center flex-1">
                <div class="text-center space-y-1.5 mb-8">
                    <h2 class="text-2xl font-bold text-neutral-950 tracking-tight">Log in to your account</h2>
                    <p class="text-sm font-medium text-neutral-400">Enter your credentials to access the marketplace.</p>
                </div>

                <div id="googleButtonContainer" class="w-full flex justify-center"></div>

                <div class="flex items-center my-5">
                    <div class="flex-1 border-t border-neutral-100"></div>
                    <span class="px-4 text-[10px] font-bold text-neutral-400 tracking-widest uppercase">or</span>
                    <div class="flex-1 border-t border-neutral-100"></div>
                </div>

                <form id="loginForm" class="space-y-4" novalidate>
                    <div>
                        <label class="block text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-neutral-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
                                </svg>
                            </span>
                            <input id="emailInput" type="email" placeholder="you@gmail.com" class="w-full bg-neutral-50 focus:bg-white text-neutral-900 placeholder-neutral-400 text-sm font-medium pl-10 pr-4 py-3 rounded-xl border border-neutral-200/80 focus:border-neutral-950 focus:ring-4 focus:ring-neutral-100 transition-all outline-none" required />
                        </div>
                        <p id="validationError" class="hidden text-red-600 text-xs font-semibold mt-1.5 flex items-center gap-1.5">
                            <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                            </svg>
                            System requires a valid working @gmail.com address.
                        </p>
                    </div>

                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Password</label>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-neutral-400">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                                </svg>
                            </span>
                            <input id="passwordInput" type="password" placeholder="Enter your password" class="w-full bg-neutral-50 focus:bg-white text-neutral-900 placeholder-neutral-400 text-sm pl-10 pr-10 py-3 rounded-xl border border-neutral-200/80 focus:border-neutral-950 focus:ring-4 focus:ring-zinc-100 transition-all outline-none" required />
                            
                            <button type="button" onclick="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-neutral-400 hover:text-neutral-950 transition-colors focus:outline-none">
                                <i id="toggleEyeIcon" class="ri-eye-line text-lg"></i>
                            </button>
                        </div>
                    </div>

                    <p id="masterFormFeedback" class="hidden text-red-600 text-xs font-semibold flex items-center gap-1.5 pt-1">
                        <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
                        </svg>
                        <span id="feedbackText">Authentication failed.</span>
                    </p>

                    <button type="submit" id="submitBtn" class="w-full bg-neutral-950 hover:bg-neutral-900 text-white font-bold text-sm py-3.5 rounded-xl transition-all duration-200 flex justify-center items-center gap-2 shadow-md">
                        <span>Login</span>
                    </button>
                </form>
            </div>

            <div class="w-full pt-4 text-center border-t border-neutral-100">
                <p class="text-xs text-neutral-400 font-medium">Don't have an account? <button onclick="window.location.href='register.html'" class="text-neutral-950 font-bold hover:underline ml-1 focus:outline-none">Create one!</button></p>
            </div>
        </div>
    </div>

    <script>
        // Clean Animated Image Pulse Transition
        function executeSuccessModalFlow(fallbackRedirectUrl) {
            const overlayLoader = document.getElementById('successModal');
            overlayLoader.classList.remove('opacity-0', 'pointer-events-none');
            overlayLoader.classList.add('opacity-100');
            setTimeout(() => { window.location.href = fallbackRedirectUrl; }, 1400);
        }

        function deployInlineFeedback(message, targetElementId = 'masterFormFeedback', textContainerId = 'feedbackText') {
            const container = document.getElementById(targetElementId);
            const textNode = document.getElementById(textContainerId);
            if (container && textNode) {
                textNode.textContent = message;
                container.classList.remove('hidden');
            }
        }

        function clearAllValidationStates() {
            document.getElementById('masterFormFeedback').classList.add('hidden');
            document.getElementById('validationError').classList.add('hidden');
            document.getElementById('emailInput').classList.remove('border-red-500', 'focus:border-red-500', 'focus:ring-red-100');
        }

        function togglePasswordVisibility() {
            const field = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleEyeIcon');

            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('ri-eye-line');
                icon.classList.add('ri-eye-off-line');
            } else {
                field.type = 'password';
                icon.classList.remove('ri-eye-off-line');
                icon.classList.add('ri-eye-line');
            }
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "732790915641-9mcsgdk0evenaaraevki7enjjv3vrhu9.apps.googleusercontent.com",
                callback: handleGoogleAuthCallback
            });

            // NEW: Renders the official Canva-style inline iframe button
            google.accounts.id.renderButton(
                document.getElementById("googleButtonContainer"),
                { theme: "outline", size: "large", width: 342, text: "continue_with", shape: "rectangular", logo_alignment: "center" }
            );

            // Optional: Automatically shows the slide-down One Tap prompt if the user hasn't closed it recently
            google.accounts.id.prompt(); 
        };

        async function handleGoogleAuthCallback(response) {
            const submitBtn = document.getElementById('submitBtn');
            
            // Dynamic production environment check routing fallback matrix
            const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
                ? 'http://localhost:3000' 
                : 'https://zellr-campus-marketplace.vercel.app';

            try {
                submitBtn.innerHTML = '<i class="p-1 border-2 border-t-transparent border-white rounded-full animate-spin"></i> Connecting...';
                
                const res = await fetch(`${API_BASE}/api/auth/google`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: response.credential })
                });
                
                const data = await res.json();
                if (res.ok) {
                    // FIX: Only strip specific identity keys to preserve system notice read tracking states
                    localStorage.removeItem('zellr_session_token');
                    localStorage.removeItem('zellr_user_profile');
                    
                    // Establish the clean, new session
                    localStorage.setItem('zellr_session_token', data.token);
                    localStorage.setItem('zellr_user_profile', JSON.stringify(data.user));
                    
                    // ROLE-BASED ACCESS GATE ROUTING FOR OAUTH PIPELINES (CASE-INSENSITIVE)
                    if (data.user && data.user.role && String(data.user.role).toLowerCase().trim() === 'admin') {
                        executeSuccessModalFlow('admin/admin_overview.html');
                    } else {
                        executeSuccessModalFlow('dashboard.html');
                    }
                } else {
                    deployInlineFeedback(data.error || 'Invalid email or password credentials.');
                }
            } catch (err) {
                deployInlineFeedback('Google integration gateway timed out.');
                submitBtn.innerHTML = '<span>Login</span>';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            clearAllValidationStates();
            
            const emailField = document.getElementById('emailInput');
            const passwordField = document.getElementById('passwordInput');
            
            if (!emailField.value.trim().toLowerCase().endsWith('@gmail.com')) {
                emailField.classList.add('border-red-500', 'focus:border-red-500', 'focus:ring-red-100');
                document.getElementById('validationError').classList.remove('hidden');
                return;
            }

            // FIX: Query the correct button ID matching the HTML template layout anchor
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;

            // NEW: Dynamic API Base Routing (Adapts to localhost, 127.0.0.1, or live domain)
            const API_BASE = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
                ? 'http://localhost:3000' 
                : 'https://zellr-campus-marketplace.vercel.app';

            submitBtn.innerHTML = '<i class="p-1 border-2 border-t-transparent border-white rounded-full animate-spin"></i> Authenticating...';
            submitBtn.style.pointerEvents = 'none';

            try {
                const res = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailField.value.trim(), password: passwordField.value.trim() })
                });
                
                const data = await res.json();
                submitBtn.innerHTML = originalText;
                submitBtn.style.pointerEvents = 'auto';

                if (res.ok) {
                    localStorage.removeItem('zellr_session_token');
                    localStorage.removeItem('zellr_user_profile');
                    
                    localStorage.setItem('zellr_session_token', data.token);
                    localStorage.setItem('zellr_user_profile', JSON.stringify(data.user));
                    
                    // ROLE-BASED ACCESS GATE ROUTING WITH FOLDER PATH UPDATE (CASE-INSENSITIVE)
                    if (data.user && data.user.role && String(data.user.role).toLowerCase().trim() === 'admin') {
                        executeSuccessModalFlow('admin/admin_overview.html'); // Added subfolder path
                    } else {
                        executeSuccessModalFlow('dashboard.html');
                    }
                }
                
                else {
                    deployInlineFeedback(data.error || 'Invalid email or password credentials.');
                }
            } catch (error) {
                submitBtn.innerHTML = originalText;
                submitBtn.style.pointerEvents = 'auto';
                deployInlineFeedback('Cannot establish contact with authentication server.');
            }
        });
    </script>
</body>
</html>
